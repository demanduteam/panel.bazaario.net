    <script type="text/babel" data-type="module">
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area, PieChart, Pie, Cell } = window.Recharts;
        const jalaali = window.jalaali;

        // ==========================================
        // 1. Supabase Initialization
        // ==========================================
        const supabaseUrl = typeof __supabase_url !== 'undefined' ? __supabase_url : 'https://wehyjatotbzxargnxasg.supabase.co';
        const supabaseKey = typeof __supabase_anon_key !== 'undefined' ? __supabase_anon_key : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlaHlqYXRvdGJ6eGFyZ254YXNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE5MTIwMjEsImV4cCI6MjA2NzQ4ODAyMX0.2R448DuEBlTrNvaYXiYZ8D5M7MJNv7n1qmIDHQBNFiY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const ADMIN_ROLE_ID = 1;

        // ==========================================
        // 2. Helper Functions
        // ==========================================
        const formatCurrency = (value) => {
            if (!value) return '۰ تومان';
            if (value >= 1e9) return (value / 1e9).toFixed(2) + ' میلیارد تومان';
            if (value >= 1e6) return (value / 1e6).toFixed(1) + ' میلیون تومان';
            return value.toLocaleString('fa-IR') + ' تومان';
        };

        const formatNumber = (num) => Number(num || 0).toLocaleString('fa-IR');

        const calculateWorkingHours = (startDate, endDate) => {
            if (startDate >= endDate) return 0;
            const totalMs = endDate.getTime() - startDate.getTime();
            
            let fridaysMs = 0;
            let current = new Date(startDate);
            current.setHours(0, 0, 0, 0); 
            
            let endDay = new Date(endDate);
            endDay.setHours(0, 0, 0, 0);
            
            while(current <= endDay) {
                if (current.getDay() === 5) { 
                    let fridayStart = new Date(current);
                    let fridayEnd = new Date(current);
                    fridayEnd.setHours(23, 59, 59, 999);
                    
                    let overlapStart = Math.max(startDate.getTime(), fridayStart.getTime());
                    let overlapEnd = Math.min(endDate.getTime(), fridayEnd.getTime());
                    
                    if (overlapStart < overlapEnd) {
                        fridaysMs += (overlapEnd - overlapStart);
                    }
                }
                current.setDate(current.getDate() + 1);
            }
            
            return (totalMs - fridaysMs) / (1000 * 60 * 60);
        };

        // ==========================================
        // 3. UI Components (Box Design)
        // ==========================================
        const KpiBox = ({ title, value, subtitle, icon, color, isLoading }) => {
            const colorClasses = {
                blue: 'bg-blue-50 text-blue-600 border-blue-100',
                emerald: 'bg-emerald-50 text-emerald-600 border-emerald-100',
                purple: 'bg-purple-50 text-purple-600 border-purple-100',
                amber: 'bg-amber-50 text-amber-600 border-amber-100',
                rose: 'bg-rose-50 text-rose-600 border-rose-100',
                slate: 'bg-slate-50 text-slate-600 border-slate-200',
                cyan: 'bg-cyan-50 text-cyan-600 border-cyan-100',
                teal: 'bg-teal-50 text-teal-600 border-teal-100',
                pink: 'bg-pink-50 text-pink-600 border-pink-100',
                indigo: 'bg-indigo-50 text-indigo-600 border-indigo-100',
                sky: 'bg-sky-50 text-sky-600 border-sky-100'
            };

            return (
                <div className="glass-card rounded-2xl p-4 sm:p-5 flex items-center gap-4 fade-in w-full transition-shadow hover:shadow-card">
                    <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center text-xl sm:text-2xl border shrink-0 ${colorClasses[color]}`}>
                        <i className={`fa-solid ${icon}`}></i>
                    </div>
                    <div className="flex-1 min-w-0">
                        <h4 className="text-slate-500 text-xs sm:text-[13px] font-semibold mb-1 truncate">{title}</h4>
                        <div className="flex items-baseline gap-1.5 flex-wrap">
                            {isLoading ? (
                                <div className="h-7 w-20 bg-slate-200 animate-pulse rounded"></div>
                            ) : (
                                <span className="text-xl sm:text-2xl font-black text-slate-800 font-en tracking-tight">{value}</span>
                            )}
                            {subtitle && !isLoading && <span className="text-[10px] sm:text-xs text-slate-400 font-medium whitespace-nowrap">{subtitle}</span>}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. Main Dashboard Component
        // ==========================================
        const Dashboard = () => {
            const [isAuthorized, setIsAuthorized] = React.useState(false);
            const [authLoading, setAuthLoading] = React.useState(true);

            const [selectedYear, setSelectedYear] = React.useState(1405);
            const [filterType, setFilterType] = React.useState('seasonal');
            const [selectedPeriod, setSelectedPeriod] = React.useState(1);

            const [dbData, setDbData] = React.useState([]);
            const [stats, setStats] = React.useState(null);
            const [overallTotals, setOverallTotals] = React.useState({ customers: 0, suppliers: 0, products: 0 });
            
            const [unactedData, setUnactedData] = React.useState({ period: [], overall: [] });
            const [unactedTab, setUnactedTab] = React.useState('period'); 
            
            const [isLoading, setIsLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                const verifyAuth = async () => {
                    try {
                        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                        if (sessionError || !session) {
                            window.location.href = 'index.html';
                            return;
                        }

                        const { data: profile, error: profileError } = await supabase
                            .from('profiles')
                            .select('roleid')
                            .eq('id', session.user.id)
                            .single();

                        if (profileError || !profile || profile.roleid !== ADMIN_ROLE_ID) {
                            alert('شما دسترسی لازم برای مشاهده این داشبورد را ندارید.');
                            window.location.href = 'index.html';
                            return;
                        }

                        setIsAuthorized(true);
                    } catch (err) {
                        window.location.href = 'index.html';
                    } finally {
                        setAuthLoading(false);
                    }
                };

                verifyAuth();

                const { data: authListener } = supabase.auth.onAuthStateChange((event) => {
                    if (event === 'SIGNED_OUT') window.location.href = 'index.html';
                });

                return () => {
                    if (authListener && authListener.subscription) authListener.subscription.unsubscribe();
                };
            }, []);

            const getPeriodOptions = () => {
                if (filterType === 'seasonal') return [ { value: 1, label: 'فصل اول (بهار)' }, { value: 2, label: 'فصل دوم (تابستان)' }, { value: 3, label: 'فصل سوم (پاییز)' }, { value: 4, label: 'فصل چهارم (زمستان)' } ];
                if (filterType === 'monthly') return ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'].map((m, i) => ({ value: i + 1, label: m }));
                if (filterType === 'weekly') return Array.from({length: 52}, (_, i) => ({ value: i + 1, label: `هفته ${i + 1}` }));
                return [];
            };

            React.useEffect(() => { setSelectedPeriod(1); }, [filterType, selectedYear]);

            // ==========================================
            // Main Data Fetching (Optimized using marketing_daily_stats)
            // ==========================================
            React.useEffect(() => {
                if (!isAuthorized) return;

                const fetchPeriodData = async () => {
                    setIsLoading(true);
                    setError(null);
                    try {
                        const SAFE_CHUNK_SIZE = 100;

                        // 1. محاسبه تاریخ شروع و پایان فیلتر
                        let startMonth = 1, endMonth = 12, startDay = 1, endDay = 29;
                        let startDoy = 1, endDoy = 365;

                        const getDoy = (y, m, d) => {
                            let doy = 0;
                            for (let i = 1; i < m; i++) doy += jalaali.jalaaliMonthLength(y, i);
                            return doy + d;
                        };

                        const getJDateByDoy = (year, doy) => {
                            let m = 1; let d = doy;
                            while (m <= 12) {
                                let dim = jalaali.jalaaliMonthLength(year, m);
                                if (d <= dim) break;
                                d -= dim;
                                m++;
                            }
                            if (m > 12) { m = 12; d = jalaali.jalaaliMonthLength(year, 12); }
                            return { m, d };
                        };

                        if (filterType === 'seasonal') {
                            startMonth = (selectedPeriod - 1) * 3 + 1;
                            endMonth = selectedPeriod * 3;
                            startDay = 1;
                            endDay = jalaali.jalaaliMonthLength(selectedYear, endMonth);
                        } else if (filterType === 'monthly') {
                            startMonth = selectedPeriod;
                            endMonth = selectedPeriod;
                            startDay = 1;
                            endDay = jalaali.jalaaliMonthLength(selectedYear, endMonth);
                        } else if (filterType === 'weekly') {
                            startDoy = (selectedPeriod - 1) * 7 + 1;
                            endDoy = selectedPeriod * 7;
                            const maxDoy = jalaali.isLeapJalaaliYear(selectedYear) ? 366 : 365;
                            if (endDoy > maxDoy) endDoy = maxDoy;
                            const startJ = getJDateByDoy(selectedYear, startDoy);
                            const endJ = getJDateByDoy(selectedYear, endDoy);
                            startMonth = startJ.m; startDay = startJ.d;
                            endMonth = endJ.m; endDay = endJ.d;
                        }

                        const startG = jalaali.toGregorian(selectedYear, startMonth, startDay);
                        const endG = jalaali.toGregorian(selectedYear, endMonth, endDay);
                        
                        const startDateStr = new Date(startG.gy, startG.gm - 1, startG.gd).toISOString().split('T')[0];
                        const endDateStr = new Date(endG.gy, endG.gm - 1, endG.gd).toISOString().split('T')[0];
                        const endDateFull = new Date(endG.gy, endG.gm - 1, endG.gd, 23, 59, 59).toISOString();
                        const startDateFull = new Date(startG.gy, startG.gm - 1, startG.gd, 0, 0, 0).toISOString();

                        // 2. Fetch Aggregated Data from New Table (Lightweight Query!)
                        const { data: dailyStats, error: statsError } = await supabase
                            .from('marketing_daily_stats')
                            .select('*')
                            .gte('record_date', startDateStr)
                            .lte('record_date', endDateStr)
                            .order('record_date', { ascending: true });

                        if (statsError) throw new Error(`خطا در جدول تجمیعی: ${statsError.message}`);

                        // 3. Process the results for Charts & KPIs
                        const chartDataMap = (dailyStats || []).map(d => {
                            const gDate = new Date(d.record_date);
                            const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                            return {
                                name: `${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')}`,
                                'عادی': d.demands_normal,
                                'اشتراکی': d.demands_sub,
                                'GMV': Number(d.total_gmv),
                                'کل اقلام': d.total_items,
                                'اقلام تامین شده': d.fulfilled_items
                            };
                        });
                        setDbData(chartDataMap);

                        // 4. Calculate sums for KPIs
                        const sum = (key) => (dailyStats || []).reduce((acc, curr) => acc + (Number(curr[key]) || 0), 0);
                        
                        // Extract overall totals from the most recent day in the range (or last fetched)
                        let latestCust = 0, latestSupp = 0, latestProd = 0;
                        if (dailyStats && dailyStats.length > 0) {
                            const last = dailyStats[dailyStats.length - 1];
                            latestCust = last.total_customers_overall;
                            latestSupp = last.total_suppliers_overall;
                            latestProd = last.total_products_overall;
                        } else {
                            // Fallback if no data in period, get the absolute latest record
                            const { data: latestRecord } = await supabase.from('marketing_daily_stats').select('*').order('record_date', { ascending: false }).limit(1).maybeSingle();
                            if(latestRecord) {
                                latestCust = latestRecord.total_customers_overall;
                                latestSupp = latestRecord.total_suppliers_overall;
                                latestProd = latestRecord.total_products_overall;
                            }
                        }

                        setOverallTotals({ customers: latestCust, suppliers: latestSupp, products: latestProd });

                        setStats({
                            newCustomers: sum('new_customers'),
                            newSuppliers: sum('new_suppliers'),
                            totalNewUsers: sum('new_customers') + sum('new_suppliers'),
                            totalDemands: sum('total_demands'),
                            demandsNormal: sum('demands_normal'),
                            demandsSub: sum('demands_sub'),
                            totalFollowups: sum('total_followups'),
                            salesCount: sum('sales_count'),
                            gmv: sum('total_gmv'),
                            gmvNormal: sum('gmv_normal'), // approximation based on table definition if we split it
                            gmvSub: sum('gmv_sub'),
                            totalItems: sum('total_items'),
                            itemsNormal: sum('items_normal'),
                            itemsSub: sum('items_sub'),
                            fulfilledItems: sum('fulfilled_items'),
                            soldItems: sum('sold_items'),
                            diversityRequested: sum('unique_products_requested'),
                            diversitySold: sum('unique_products_sold'),
                            // Conversions
                            fulfillmentRateNormal: sum('items_normal') > 0 ? (sum('fulfilled_items') / sum('total_items')) * 100 : 0, 
                            fulfillmentRateSub: sum('items_sub') > 0 ? (sum('fulfilled_items') / sum('total_items')) * 100 : 0,
                            funnelConversion: sum('fulfilled_items') > 0 ? (sum('sold_items') / sum('fulfilled_items')) * 100 : 0,
                            diversityConversion: sum('unique_products_requested') > 0 ? (sum('unique_products_sold') / sum('unique_products_requested')) * 100 : 0
                        });


                        // ==============================================================
                        // --- 5. محاسبه تقاضاهای بدون اقدام زنده (همیشه آپدیت) ---
                        // این بخش همچنان از جداول اصلی خوانده می‌شود تا هشدارها دقیق باشند
                        // ==============================================================
                        const now = new Date();
                        const { data: allRecentDemands } = await supabase
                            .from('demand')
                            .select('id, createdat, is_emergency')
                            .eq('isdeleted', false)
                            .lte('createdat', now.toISOString())
                            .order('createdat', { ascending: false })
                            .limit(1000); // به ۱۰۰۰ کاهش دادیم تا کاملا امن باشد

                        const candidateDemands = (allRecentDemands || []).filter(d => {
                            if (!d.createdat) return false;
                            return calculateWorkingHours(new Date(d.createdat), now) >= 48;
                        });

                        let allUnactedOverall = [];
                        
                        if (candidateDemands.length > 0) {
                            const candidateIds = candidateDemands.map(d => d.id);
                            
                            let candItems = [];
                            for(let i=0; i < candidateIds.length; i+= SAFE_CHUNK_SIZE) {
                                const chunk = candidateIds.slice(i, i + SAFE_CHUNK_SIZE);
                                const { data: ci } = await supabase.from('demand_item').select('id, demandid').in('demandid', chunk);
                                if(ci) candItems.push(...ci);
                            }

                            const itemIds = candItems.map(i => i.id);
                            let candLogs = [];
                            if (itemIds.length > 0) {
                                for(let i=0; i < itemIds.length; i+= SAFE_CHUNK_SIZE) {
                                    const chunk = itemIds.slice(i, i + SAFE_CHUNK_SIZE);
                                    const { data: logsChunk } = await supabase.from('demand_item_log').select('demand_item_id').in('demand_item_id', chunk);
                                    if(logsChunk) candLogs.push(...logsChunk);
                                }
                            }

                            const logItemIds = new Set(candLogs.map(l => l.demand_item_id));

                            candidateDemands.forEach(d => {
                                const itemsForD = candItems.filter(ci => ci.demandid === d.id);
                                let hasAction = itemsForD.length > 0 && itemsForD.some(ci => logItemIds.has(ci.id));
                                if (!hasAction) allUnactedOverall.push(d);
                            });
                        }

                        allUnactedOverall.sort((a, b) => new Date(a.createdat) - new Date(b.createdat));

                        const periodStartMs = new Date(startDateFull).getTime();
                        const periodEndMs = new Date(endDateFull).getTime();

                        const periodUnacted = allUnactedOverall.filter(d => {
                            const t = new Date(d.createdat).getTime();
                            return t >= periodStartMs && t <= periodEndMs;
                        });

                        setUnactedData({ period: periodUnacted, overall: allUnactedOverall });

                    } catch (e) {
                        console.error("Dashboard Runtime Error:", e);
                        setError(e.message);
                    } finally {
                        setIsLoading(false);
                    }
                };

                fetchPeriodData();
            }, [selectedYear, filterType, selectedPeriod, isAuthorized]);

            // --- Show Loading While Checking Auth ---
            if (authLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-700">
                        <i className="fa-solid fa-shield-halved text-5xl text-brand-500 mb-4 animate-pulse"></i>
                        <h2 className="font-bold text-xl mb-2">در حال تایید هویت</h2>
                        <p className="text-sm text-slate-500">لطفا تا بررسی دسترسی شما منتظر بمانید...</p>
                    </div>
                );
            }

            // --- Main Render (Authorized Only) ---
            return (
                <div className="p-3 sm:p-6 lg:p-8 max-w-[1600px] mx-auto min-h-screen flex flex-col gap-6">
                    
                    {/* Header Box */}
                    <div className="glass-card rounded-3xl p-4 sm:p-6 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 sm:gap-6 z-10 relative">
                        <div className="flex items-center gap-3 sm:gap-4 w-full xl:w-auto justify-between xl:justify-start">
                            <div className="flex items-center gap-3 sm:gap-4">
                                <div className="w-12 h-12 sm:w-14 sm:h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center text-white shadow-md shrink-0">
                                    <i className="fa-solid fa-chart-column text-xl sm:text-2xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg sm:text-2xl font-black text-slate-800">گزارشات بازاریابی</h1>
                                    <p className="text-slate-500 text-xs sm:text-sm mt-0.5 sm:mt-1">رصد فوق‌سریع شاخص‌ها (متصل به جدول تجمیعی)</p>
                                </div>
                            </div>
                            <a href="index.html" className="xl:hidden flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-xl transition-colors text-xs font-bold shrink-0">
                                <span className="hidden sm:inline">منوی اصلی</span>
                                <i className="fa-solid fa-arrow-left"></i>
                            </a>
                        </div>

                        <div className="flex items-center gap-4 w-full xl:w-auto">
                            <div className="flex flex-col sm:flex-row flex-wrap items-stretch sm:items-center gap-2 sm:gap-3 bg-slate-50 p-2.5 sm:p-2 rounded-2xl border border-slate-100 w-full xl:w-auto flex-1">
                                <div className="flex items-center gap-2 px-2 pb-2 sm:pb-0 border-b sm:border-b-0 border-slate-200">
                                    <i className="fa-solid fa-filter text-slate-400 text-sm"></i>
                                    <span className="text-xs sm:text-sm font-bold text-slate-600">فیلتر:</span>
                                </div>
                                
                                <div className="flex gap-2 w-full sm:w-auto">
                                    <select 
                                        value={selectedYear} onChange={(e) => setSelectedYear(Number(e.target.value))}
                                        className="flex-1 sm:flex-none bg-white border border-slate-200 text-xs sm:text-sm rounded-xl px-2 sm:px-4 py-2 sm:py-2.5 font-en font-semibold focus:outline-none focus:border-brand-400"
                                    >
                                        <option value={1404}>1404</option><option value={1405}>1405</option>
                                    </select>

                                    <select 
                                        value={filterType} onChange={(e) => setFilterType(e.target.value)}
                                        className="flex-1 sm:flex-none bg-white border border-slate-200 text-xs sm:text-sm rounded-xl px-2 sm:px-4 py-2 sm:py-2.5 font-vazir font-semibold focus:outline-none focus:border-brand-400"
                                    >
                                        <option value="seasonal">فصلی</option><option value="monthly">ماهانه</option><option value="weekly">هفتگی</option>
                                    </select>

                                        <Tooltip cursor={{fill: '#f8fafc'}} formatter={(val) => [formatNumber(val) + ' ت', 'GMV']} contentStyle={{fontSize:'12px', fontFamily:'Vazirmatn', borderRadius:'8px', border:'none', boxShadow:'0 4px 10px rgba(0,0,0,0.1)'}} />
                                        <Bar dataKey="GMV" fill="#10b981" radius={[4, 4, 0, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
