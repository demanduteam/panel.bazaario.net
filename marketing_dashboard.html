        // ==========================================

        // ==========================================
        const formatCurrency = (value) => {
            if (!value) return '۰ تومان';
            if (value >= 1e9) return (value / 1e9).toFixed(2) + ' میلیارد تومان';
            if (value >= 1e6) return (value / 1e6).toFixed(1) + ' میلیون تومان';
            return value.toLocaleString('fa-IR') + ' تومان';
        };

        const formatNumber = (num) => Number(num || 0).toLocaleString('fa-IR');

        // تابع محاسبه ساعات کاری (کسر کردن روزهای جمعه)
        const calculateWorkingHours = (startDate, endDate) => {
            if (startDate >= endDate) return 0;
            const totalMs = endDate.getTime() - startDate.getTime();
            
            let fridaysMs = 0;
            let current = new Date(startDate);
            current.setHours(0, 0, 0, 0); // شروع از ابتدای روز
            
            let endDay = new Date(endDate);
            endDay.setHours(0, 0, 0, 0);
            
            while(current <= endDay) {
                if (current.getDay() === 5) { // روز 5 به معنای جمعه است
                    let fridayStart = new Date(current);
                    let fridayEnd = new Date(current);
                    fridayEnd.setHours(23, 59, 59, 999);
                    
                    let overlapStart = Math.max(startDate.getTime(), fridayStart.getTime());
                    let overlapEnd = Math.min(endDate.getTime(), fridayEnd.getTime());
                    
                    if (overlapStart < overlapEnd) {
                        fridaysMs += (overlapEnd - overlapStart);
                    }
                }
                current.setDate(current.getDate() + 1);
            }
            
            return (totalMs - fridaysMs) / (1000 * 60 * 60);
        };

        // ==========================================
        // 3. UI Components (Box Design)
        // ==========================================
        const KpiBox = ({ title, value, subtitle, icon, color, isLoading }) => {
            const colorClasses = {
                blue: 'bg-blue-50 text-blue-600 border-blue-100',

            return (
                <div className="glass-card rounded-2xl p-4 sm:p-5 flex items-center gap-4 fade-in w-full transition-shadow hover:shadow-card">

                            {isLoading ? (

                            ) : (
                                <span className="text-xl sm:text-2xl font-black text-slate-800 font-en tracking-tight">{value}</span>
                            )}
                            {subtitle && !isLoading && <span className="text-[10px] sm:text-xs text-slate-400 font-medium whitespace-nowrap">{subtitle}</span>}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. Main Dashboard Component
        // ==========================================
        const Dashboard = () => {
            // --- Authentication States ---
            const [isAuthorized, setIsAuthorized] = React.useState(false);
            const [authLoading, setAuthLoading] = React.useState(true);

            // Filters
            const [selectedYear, setSelectedYear] = React.useState(1405);
            const [filterType, setFilterType] = React.useState('seasonal');
            const [selectedPeriod, setSelectedPeriod] = React.useState(1);

            // Data States
            const [dbData, setDbData] = React.useState([]);
            const [activeSubsCount, setActiveSubsCount] = React.useState(0);
            const [catalogStats, setCatalogStats] = React.useState({ newProducts: 0, updatedProducts: 0, activeSuppliers: 0 });
            const [overallTotals, setOverallTotals] = React.useState({ customers: 0, suppliers: 0, products: 0 });
            
            // Unacted Demands State (period & overall)
            const [unactedData, setUnactedData] = React.useState({ period: [], overall: [] });
            const [unactedTab, setUnactedTab] = React.useState('period'); // 'period' | 'overall'
            
            const [isLoading, setIsLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            // --- Authentication Verification ---
            React.useEffect(() => {
                const verifyAuth = async () => {
                    try {
                        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                        if (sessionError || !session) {
                            window.location.href = 'index.html';
                            return;
                        }

                        const { data: profile, error: profileError } = await supabase
                            .from('profiles')
                            .select('roleid')
                            .eq('id', session.user.id)
                            .single();

                        if (profileError || !profile || profile.roleid !== ADMIN_ROLE_ID) {
                            alert('شما دسترسی لازم برای مشاهده این داشبورد را ندارید.');
                            window.location.href = 'index.html';
                            return;
                        }

                        setIsAuthorized(true);
                    } catch (err) {
                        console.error("Auth verification failed:", err);
                        window.location.href = 'index.html';
                    } finally {
                        setAuthLoading(false);
                    }
                };

                verifyAuth();

                const { data: authListener } = supabase.auth.onAuthStateChange((event) => {
                    if (event === 'SIGNED_OUT') window.location.href = 'index.html';
                });

                return () => {
                    if (authListener && authListener.subscription) authListener.subscription.unsubscribe();
                };
            }, []);

            // Period Options
            const getPeriodOptions = () => {
                if (filterType === 'seasonal') return [ { value: 1, label: 'فصل اول (بهار)' }, { value: 2, label: 'فصل دوم (تابستان)' }, { value: 3, label: 'فصل سوم (پاییز)' }, { value: 4, label: 'فصل چهارم (زمستان)' } ];
                if (filterType === 'monthly') return ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'].map((m, i) => ({ value: i + 1, label: m }));
                if (filterType === 'weekly') return Array.from({length: 52}, (_, i) => ({ value: i + 1, label: `هفته ${i + 1}` }));
                return [];
            };

            React.useEffect(() => { setSelectedPeriod(1); }, [filterType, selectedYear]);

            // Data Fetching Logic (Supabase)
            React.useEffect(() => {
                if (!isAuthorized) return;

                const fetchPeriodData = async () => {
                    setIsLoading(true);
                    setError(null);
                    try {
                        let startMonth = 1, endMonth = 12, startDay = 1, endDay = 29;
                        let startDoy = 1, endDoy = 365;

                        const getDoy = (y, m, d) => {
                            let doy = 0;
                            for (let i = 1; i < m; i++) doy += jalaali.jalaaliMonthLength(y, i);
                            return doy + d;
                        };

                        const getJDateByDoy = (year, doy) => {
                            let m = 1; let d = doy;
                            while (m <= 12) {
                                let dim = jalaali.jalaaliMonthLength(year, m);
                                if (d <= dim) break;
                                d -= dim;
                                m++;
                            }
                            if (m > 12) { m = 12; d = jalaali.jalaaliMonthLength(year, 12); }
                            return { m, d };
                        };

                        if (filterType === 'seasonal') {
                            startMonth = (selectedPeriod - 1) * 3 + 1;
                            endMonth = selectedPeriod * 3;
                            startDay = 1;
                            endDay = jalaali.jalaaliMonthLength(selectedYear, endMonth);
                            startDoy = getDoy(selectedYear, startMonth, startDay);
                            endDoy = getDoy(selectedYear, endMonth, endDay);
                        } else if (filterType === 'monthly') {
                            startMonth = selectedPeriod;
                            endMonth = selectedPeriod;
                            startDay = 1;
                            endDay = jalaali.jalaaliMonthLength(selectedYear, endMonth);
                            startDoy = getDoy(selectedYear, startMonth, startDay);
                            endDoy = getDoy(selectedYear, endMonth, endDay);
                        } else if (filterType === 'weekly') {
                            startDoy = (selectedPeriod - 1) * 7 + 1;
                            endDoy = selectedPeriod * 7;
                            
                            const maxDoy = jalaali.isLeapJalaaliYear(selectedYear) ? 366 : 365;
                            if (endDoy > maxDoy) endDoy = maxDoy;

                            const startJ = getJDateByDoy(selectedYear, startDoy);
                            const endJ = getJDateByDoy(selectedYear, endDoy);

                            startMonth = startJ.m;
                            startDay = startJ.d;
                            endMonth = endJ.m;
                            endDay = endJ.d;
                        }

                        const startG = jalaali.toGregorian(selectedYear, startMonth, startDay);
                        const endG = jalaali.toGregorian(selectedYear, endMonth, endDay);
                        
                        const startDate = new Date(startG.gy, startG.gm - 1, startG.gd, 0, 0, 0).toISOString();
                        const endDate = new Date(endG.gy, endG.gm - 1, endG.gd, 23, 59, 59).toISOString();

                        // Fetch Active Subscriptions
                        const { data: subsProfiles } = await supabase
                            .from('profiles')
                            .select(`
                                id,
                                subscription_start_date,
                                subscription_plan ( duration_days )
                            `)
                            .not('subscription_plan_id', 'is', null)
                            .lte('subscription_start_date', endDate)
                            .eq('isdeleted', false);
                            
                        let validCount = 0;
                        const periodStart = new Date(startDate);
                        
                        if (subsProfiles) {
                            subsProfiles.forEach(p => {
                                if (p.subscription_start_date && p.subscription_plan && typeof p.subscription_plan.duration_days === 'number') {
                                    const subStart = new Date(p.subscription_start_date);
                                    const subEnd = new Date(subStart);
                                    subEnd.setDate(subEnd.getDate() + p.subscription_plan.duration_days);
                                    
                                    if (subEnd >= periodStart) {
                                        validCount++;
                                    }
                                }
                            });
                        }
                        setActiveSubsCount(validCount);

                        // Fetch Status Types
                        const { data: statusTypes } = await supabase.from('demandstatustype').select('id, main_status');
                        const fulfilledStatusIds = new Set((statusTypes || [])
                            .filter(s => ['Fulfilled', 'تامین شده', 'تامین شد', 'موفق'].includes(s.main_status))
                            .map(s => s.id));
                            
                        // Fetch Roles
                        const { data: rolesData } = await supabase.from('role').select('id, title');
                        const customerRoleIds = new Set();
                        const supplierRoleIds = new Set();
                        
                        if (rolesData) {
                            rolesData.forEach(r => {
                                const t = (r.title || '').toLowerCase();
                                if (t.includes('customer') || t.includes('مشتری') || t.includes('خریدار')) customerRoleIds.add(r.id);
                                if (t.includes('supplier') || t.includes('تامین') || t.includes('فروشنده') || t.includes('سپلایر')) supplierRoleIds.add(r.id);
                            });
                        }

                        // --- Fetch Overall Totals for Roles ---
                        let totalCust = 0;
                        let totalSupp = 0;
                        const custRoleArr = Array.from(customerRoleIds);
                        const suppRoleArr = Array.from(supplierRoleIds);
                        
                        if (custRoleArr.length > 0) {
                            const { count } = await supabase.from('profiles').select('*', { count: 'exact', head: true })
                                .in('roleid', custRoleArr).eq('isdeleted', false).lte('createdat', endDate);
                            totalCust = count || 0;
                        }
                        if (suppRoleArr.length > 0) {
                            const { count } = await supabase.from('profiles').select('*', { count: 'exact', head: true })
                                .in('roleid', suppRoleArr).eq('isdeleted', false).lte('createdat', endDate);
                            totalSupp = count || 0;
                        }

                        // 2. Fetch Demands for PERIOD
                        const { data: demands, error: err1 } = await supabase
                            .from('demand')
                            .select('id, createdat, is_emergency, customeruserid')
                            .gte('createdat', startDate)
                            .lte('createdat', endDate)
                            .eq('isdeleted', false)
                            .limit(10000);

                        const demandUserIdMap = new Map();
                        (demands || []).forEach(d => {
                            if (d.id && d.customeruserid) demandUserIdMap.set(d.id, d.customeruserid);
                        });

                        // 3. Fetch Demand Items
                        const { data: demandItems, error: err2 } = await supabase
                            .from('demand_item')
                            .select(`
                                id, demandid, sale_price, approved_supply_quantity, createdat, demandstatusid,
                                demandinvoicedetail(id, quantity, sales_price)
                            `)
                            .gte('createdat', startDate)
                            .lte('createdat', endDate)
                            .limit(20000);

                        // 4. Fetch Demand Item Logs
                        const { data: demandLogs, error: err3 } = await supabase
                            .from('demand_item_log')
                            .select('id, demand_item_id, created_at, new_values')
                            .gte('created_at', startDate)
                            .lte('created_at', endDate)
                            .limit(30000);
                            
                        // 4.5 Fetch Followups
                        const { data: followups, error: err4 } = await supabase
                            .from('customer_followups')
                            .select('id, created_at, customer_id')
                            .gte('created_at', startDate)
                            .lte('created_at', endDate)
                            .limit(20000);
                            
                        // 4.6 Fetch New Profiles (Users)
                        const { data: newProfiles, error: err5 } = await supabase
                            .from('profiles')
                            .select('id, createdat, roleid')
                            .gte('createdat', startDate)
                            .lte('createdat', endDate)
                            .eq('isdeleted', false)
                            .limit(20000);

                        // 4.7 Fetch Catalog Data
                        let productsData = [];
                        const { data: pData1, error: pErr1 } = await supabase
                            .from('product')
                            .select('id, createdat')
                            .gte('createdat', startDate)
                            .lte('createdat', endDate)
                            .limit(20000);
                            
                        if (pErr1) {
                            const { data: pData2 } = await supabase
                                .from('product')
                                .select('id, created_at')
                                .gte('created_at', startDate)
                                .lte('created_at', endDate)
                                .limit(20000);
                            productsData = pData2 || [];
                        } else {
                            productsData = pData1 || [];
                        }

                        // --- Fetch Overall Total for Products ---
                        let totalProd = 0;
                        const { count: pCount1, error: pCErr1 } = await supabase.from('product').select('*', { count: 'exact', head: true }).lte('createdat', endDate);
                        if (pCErr1) {
                            const { count: pCount2 } = await supabase.from('product').select('*', { count: 'exact', head: true }).lte('created_at', endDate);
                            totalProd = pCount2 || 0;
                        } else {
                            totalProd = pCount1 || 0;
                        }

                        const { data: priceHist } = await supabase
                            .from('supplierstock_price_history')
                            .select('productid, supplieruserid')
                            .gte('changed_at', startDate)
                            .lte('changed_at', endDate)
                            .limit(30000);

                        const updatedProductsSet = new Set();
                        const activeSuppliersSet = new Set();
                        (priceHist || []).forEach(ph => {
                            if (ph.productid) updatedProductsSet.add(ph.productid);
                            if (ph.supplieruserid) activeSuppliersSet.add(ph.supplieruserid);
                        });

                        setCatalogStats({
                            newProducts: productsData.length,
                            updatedProducts: updatedProductsSet.size,
                            activeSuppliers: activeSuppliersSet.size
                        });

                        if (err1) throw new Error(`خطا در جدول تقاضا: ${err1.message}`);
                        if (err2) throw new Error(`خطا در جدول آیتم‌ها: ${err2.message}`);

                        // 5. Fetch Subscriptions to categorize users
                        let subscribedUsers = new Set();
                        const allUserIds = new Set();
                        
                        if (demands && demands.length > 0) demands.forEach(d => { if(d.customeruserid) allUserIds.add(d.customeruserid); });
                        if (followups && followups.length > 0) followups.forEach(f => { if(f.customer_id) allUserIds.add(f.customer_id); });

                        let uniqueUsersArray = [];
                        if (allUserIds.size > 0) {
                            uniqueUsersArray = Array.from(allUserIds);
                            const chunkSize = 500; 
                            for (let i = 0; i < uniqueUsersArray.length; i += chunkSize) {
                                const chunk = uniqueUsersArray.slice(i, i + chunkSize);
                                const { data: subsData } = await supabase
                                    .from('user_subscription_history')
                                    .select('user_id')
                                    .in('user_id', chunk);
                                if (subsData) subsData.forEach(s => subscribedUsers.add(s.user_id));
                            }
                        }

                        // 6. Find Returning Buyers
                        let returningUserIds = new Set();
                        if (uniqueUsersArray.length > 0) {
                            for (let i = 0; i < uniqueUsersArray.length; i += 500) {
                                const chunk = uniqueUsersArray.slice(i, i + 500);
                                const { data: pastD } = await supabase
                                    .from('demand')
                                    .select('customeruserid')
                                    .in('customeruserid', chunk)
                                    .lt('createdat', startDate)
                                    .eq('isdeleted', false);
                                if (pastD) pastD.forEach(d => returningUserIds.add(d.customeruserid));
                            }
                        }

                        // ==============================================================
                        // --- 7. محاسبه تقاضاهای بدون اقدام با استفاده از ساعات کاری ---
                        // ==============================================================
                        const now = new Date();
                        
                        // الف) استخراج ۵۰۰۰ تقاضای اخیر (برای پوشش کل تقاضاهای باز از گذشته تا به امروز)
                        const { data: allRecentDemands } = await supabase
                            .from('demand')
                            .select('id, createdat, is_emergency')
                            .eq('isdeleted', false)
                            .lte('createdat', now.toISOString())
                            .order('createdat', { ascending: false })
                            .limit(5000);

                        // ب) فیلتر کردن تقاضاهایی که بیش از 48 ساعت کاری از آنها گذشته است
                        const candidateDemands = (allRecentDemands || []).filter(d => {
                            if (!d.createdat) return false;
                            return calculateWorkingHours(new Date(d.createdat), now) >= 48;
                        });

                        let allUnactedOverall = [];
                        
                        // ج) بررسی اینکه آیا این تقاضاها "اقدامی" داشته‌اند یا خیر
                        if (candidateDemands.length > 0) {
                            const candidateIds = candidateDemands.map(d => d.id);
                            
                            // واکشی آیتم‌های تقاضاهای کاندید
                            const chunkSize = 800;
                            let candItems = [];
                            for(let i=0; i < candidateIds.length; i+= chunkSize) {
                                const chunk = candidateIds.slice(i, i+chunkSize);
                                const { data: ci } = await supabase.from('demand_item').select('id, demandid').in('demandid', chunk);
                                if(ci) candItems.push(...ci);
                            }

                            // واکشی لاگ‌های مربوط به آیتم‌های کاندید
                            const itemIds = candItems.map(i => i.id);
                            let candLogs = [];
                            if (itemIds.length > 0) {
                                for(let i=0; i < itemIds.length; i+= chunkSize) {
                                    const chunk = itemIds.slice(i, i+chunkSize);
                                    const { data: logsChunk } = await supabase.from('demand_item_log').select('demand_item_id').in('demand_item_id', chunk);
                                    if(logsChunk) candLogs.push(...logsChunk);
                                }
                            }

                            const logItemIds = new Set(candLogs.map(l => l.demand_item_id));

                            // بررسی نهایی: تقاضایی که هیچ آیتمی ندارد، یا آیتم‌هایش هیچ لاگی ندارند -> بدون اقدام است
                            candidateDemands.forEach(d => {
                                const itemsForD = candItems.filter(ci => ci.demandid === d.id);
                                let hasAction = false;
                                if (itemsForD.length > 0) {
                                    hasAction = itemsForD.some(ci => logItemIds.has(ci.id));
                                }
                                if (!hasAction) {
                                    allUnactedOverall.push(d);
                                }
                            });
                        }

                        // مرتب‌سازی بر اساس قدیمی‌ترین به جدیدترین برای نمایش در لیست
                        allUnactedOverall.sort((a, b) => new Date(a.createdat) - new Date(b.createdat));

                        // تفکیک تقاضاهای بدون اقدامِ مربوط به دوره فعلی از کل
                        const periodStartMs = new Date(startDate).getTime();
                        const periodEndMs = new Date(endDate).getTime();

                        const periodUnacted = allUnactedOverall.filter(d => {
                            const t = new Date(d.createdat).getTime();
                            return t >= periodStartMs && t <= periodEndMs;
                        });

                        setUnactedData({
                            period: periodUnacted,
                            overall: allUnactedOverall
                        });
                        // ==============================================================

                        // Initialize Mapping for Charts and Aggregation
                        const dayMap = {};
                        for(let doy = startDoy; doy <= endDoy; doy++) {
                            const jDate = getJDateByDoy(selectedYear, doy);
                            const key = `${selectedYear}/${String(jDate.m).padStart(2,'0')}/${String(jDate.d).padStart(2,'0')}`;
                            dayMap[key] = { 
                                dateStr: key, 
                                demandsNormal: 0, demandsSub: 0, 
                                followupsNormal: 0, followupsSub: 0,
                                newCustomers: 0, newSuppliers: 0, newBuyers: 0,
                                salesCount: 0, salesNormal: 0, salesSub: 0, gmv: 0, gmvNormal: 0, gmvSub: 0,
                                totalItems: 0, itemsNormal: 0, itemsSub: 0,
                                fulfilledItems: 0, fulfilledItemsNormal: 0, fulfilledItemsSub: 0, soldItems: 0,
                                responseDelays: [], responseDelaysNormal: [], responseDelaysSub: [], 
                                fulfillmentDelays: [], fulfillmentDelaysNormal: [], fulfillmentDelaysSub: [] 
                            };
                        }

                        // Map Demand User Sub Status
                        const demandIsSub = {};
                        (demands || []).forEach(d => {
                            if (!d.createdat) return;
                            const isSub = subscribedUsers.has(d.customeruserid);
                            demandIsSub[d.id] = isSub;

                            const gDate = new Date(d.createdat);
                            const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                            const key = `${j.jy}/${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')}`;
                            
                            if(dayMap[key]) {
                                if(isSub) dayMap[key].demandsSub += 1; 
                                else dayMap[key].demandsNormal += 1;
                            }
                        });
                        
                        // Process Followups
                        (followups || []).forEach(f => {
                            if (!f.created_at) return;
                            const isSub = subscribedUsers.has(f.customer_id);
                            
                            const gDate = new Date(f.created_at);
                            const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                            const key = `${j.jy}/${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')}`;
                            
                            if(dayMap[key]) {
                                if(isSub) dayMap[key].followupsSub += 1; 
                                else dayMap[key].followupsNormal += 1;
                            }

                        // Process New Users (Profiles)
                        (newProfiles || []).forEach(p => {
                            if (!p.createdat) return;
                            
                            const gDate = new Date(p.createdat);
                            const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                            const key = `${j.jy}/${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')}`;
                            
                            if (dayMap[key]) {
                                if (customerRoleIds.has(p.roleid)) dayMap[key].newCustomers += 1;
                                else if (supplierRoleIds.has(p.roleid)) dayMap[key].newSuppliers += 1;
                            }

                        const invoicedDemandsSet = new Set();
                        const periodBuyersSet = new Set();

                        // Process Demand Items & Logs
                        (demandItems || []).forEach(di => {
                            if (!di.createdat) return;

                            const gDate = new Date(di.createdat);
                            const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                            const key = `${j.jy}/${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')}`;
                            
                            if (dayMap[key]) {
                                dayMap[key].totalItems += 1;
                                const isSub = demandIsSub[di.demandid];
                                if (isSub) dayMap[key].itemsSub += 1; else dayMap[key].itemsNormal += 1;

                                const isFulfilled = fulfilledStatusIds.has(di.demandstatusid);
                                if (isFulfilled) {
                                    dayMap[key].fulfilledItems += 1;
                                    if (isSub) dayMap[key].fulfilledItemsSub += 1;
                                    else dayMap[key].fulfilledItemsNormal += 1;
                                }

                                const invDetails = Array.isArray(di.demandinvoicedetail) ? di.demandinvoicedetail : (di.demandinvoicedetail ? [di.demandinvoicedetail] : []);
                                
                                if (invDetails.length > 0) {
                                    dayMap[key].soldItems += 1;
                                    
                                    if (!invoicedDemandsSet.has(di.demandid)) {
                                        invoicedDemandsSet.add(di.demandid);
                                        dayMap[key].salesCount += 1;
                                        if (isSub) dayMap[key].salesSub += 1;
                                        else dayMap[key].salesNormal += 1;

                                        const uid = demandUserIdMap.get(di.demandid);
                                        if (uid && !periodBuyersSet.has(uid)) {
                                            periodBuyersSet.add(uid);
                                            if (!returningUserIds.has(uid)) {
                                                dayMap[key].newBuyers += 1;
                                            }
                                        }
                                    }

                                    invDetails.forEach(detail => {
                                        const qty = Number(detail.quantity) || 0;
                                        const price = Number(detail.sales_price) || 0;
                                        const itemGmv = qty * price;

                                        dayMap[key].gmv += itemGmv;
                                        if (isSub) dayMap[key].gmvSub += itemGmv;
                                        else dayMap[key].gmvNormal += itemGmv;
                                    });
                                }
                                
                                const logs = (demandLogs || []).filter(l => String(l.demand_item_id) === String(di.id));
                                if(logs.length > 0) {
                                    const firstLogTime = new Date(Math.min(...logs.map(l => new Date(l.created_at))));
                                    // Use Working Hours for Delays as well to be consistent
                                    const responseDiff = calculateWorkingHours(gDate, firstLogTime);
                                    if (responseDiff >= 0) {
                                        dayMap[key].responseDelays.push(responseDiff);
                                        if (isSub) dayMap[key].responseDelaysSub.push(responseDiff);
                                        else dayMap[key].responseDelaysNormal.push(responseDiff);
                                    }

                                    if (isFulfilled) {
                                        const fLogs = logs.filter(l => {
                                            const nv = typeof l.new_values === 'string' ? JSON.parse(l.new_values || '{}') : (l.new_values || {});
                                            return nv.demandstatusid && fulfilledStatusIds.has(nv.demandstatusid);
                                        });
                                        
                                        let fulfilledLogTime = null;
                                        if (fLogs.length > 0) {
                                            fulfilledLogTime = new Date(Math.min(...fLogs.map(l => new Date(l.created_at))));
                                        } else {
                                            fulfilledLogTime = new Date(Math.max(...logs.map(l => new Date(l.created_at))));
                                        }

                                        if (fulfilledLogTime) {
                                            const fulfillDiff = calculateWorkingHours(gDate, fulfilledLogTime);
                                            if (fulfillDiff >= 0) {
                                                dayMap[key].fulfillmentDelays.push(fulfillDiff);
                                                if (isSub) dayMap[key].fulfillmentDelaysSub.push(fulfillDiff);
                                                else dayMap[key].fulfillmentDelaysNormal.push(fulfillDiff);
                                            }
                                        }
                                    }
                                }
                            }
                        });

                        // Calculate daily averages
                        processedData = processedData.map(d => ({
                            ...d,
                            responseDelayAvg: d.responseDelays.length > 0 ? d.responseDelays.reduce((a,b)=>a+b,0)/d.responseDelays.length : 0,
                            fulfillmentDelayAvg: d.fulfillmentDelays.length > 0 ? d.fulfillmentDelays.reduce((a,b)=>a+b,0)/d.fulfillmentDelays.length : 0,
                        }));

                        setOverallTotals({ customers: totalCust, suppliers: totalSupp, products: totalProd });
                        setDbData(processedData);

                    } catch (e) {
                        console.error("Dashboard Runtime Error:", e);
                        setError(e.message);
                        setDbData([]);

                    }

            }, [selectedYear, filterType, selectedPeriod, isAuthorized]);

            // Calculate Totals
            const stats = React.useMemo(() => {
                if (!dbData.length) return null;
                const sum = (k) => dbData.reduce((a,b) => a + (b[k] || 0), 0);
                
                const calcAvg = (arrKey) => {
                    const count = dbData.reduce((a,b) => a + (b[arrKey] ? b[arrKey].length : 0), 0);
                    const total = dbData.reduce((a,b) => a + (b[arrKey] ? b[arrKey].reduce((x,y)=>x+y,0) : 0), 0);
                    return count > 0 ? total / count : 0;

                const itemsSub = sum('itemsSub');
                const fulfilledItemsNormal = sum('fulfilledItemsNormal');
                const fulfilledItemsSub = sum('fulfilledItemsSub');

            // --- Main Render (Authorized Only) ---
            return (
                <div className="p-3 sm:p-6 lg:p-8 max-w-[1600px] mx-auto min-h-screen flex flex-col gap-6">
                    
                    {/* Header Box */}
                    <div className="glass-card rounded-3xl p-4 sm:p-6 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 sm:gap-6 z-10 relative">
                        <div className="flex items-center gap-3 sm:gap-4 w-full xl:w-auto justify-between xl:justify-start">
                            <div className="flex items-center gap-3 sm:gap-4">
                                <div className="w-12 h-12 sm:w-14 sm:h-14 bg-gradient-to-br from-brand-500 to-brand-700 rounded-2xl flex items-center justify-center text-white shadow-md shrink-0">
                                    <i className="fa-solid fa-chart-column text-xl sm:text-2xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg sm:text-2xl font-black text-slate-800">گزارشات بازاریابی</h1>
                                    <p className="text-slate-500 text-xs sm:text-sm mt-0.5 sm:mt-1">رصد دقیق تقاضا، اقلام و عملیات (متصل به دیتابیس)</p>
                                </div>
                            </div>
                            {/* Back to Menu Button */}
                            <a href="index.html" className="xl:hidden flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-xl transition-colors text-xs font-bold shrink-0">
                                <span className="hidden sm:inline">منوی اصلی</span>
                                <i className="fa-solid fa-arrow-left"></i>

                        <div className="flex items-center gap-4 w-full xl:w-auto">

                            </div>

                            <div className="glass-card rounded-2xl p-4 fade-in flex flex-col justify-center border-r-4 border-r-indigo-400 w-full">
                                <div className="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                                    <h4 className="text-slate-500 text-xs font-bold"><i className="fa-solid fa-headset ml-1"></i> پیگیری و تماس</h4>
                                    <span className="font-en font-black text-indigo-600 text-lg">{isLoading ? '...' : formatNumber(stats?.totalFollowups)}</span>
                                </div>
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">با عادی</span>
                                    <span className="font-en font-bold text-slate-800 text-sm">{isLoading ? '...' : formatNumber(stats?.followupsNormal)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">با اشتراکی</span>
                                    <span className="font-en font-bold text-indigo-600 text-sm">{isLoading ? '...' : formatNumber(stats?.followupsSub)}</span>
                                </div>
                            </div>

                            <div className="glass-card rounded-2xl p-4 fade-in flex flex-col justify-center border-r-4 border-r-emerald-400 w-full">
                                <div className="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                                    <h4 className="text-slate-500 text-xs font-bold"><i className="fa-solid fa-bag-shopping ml-1"></i> فاکتورها (فروش)</h4>
                                    <span className="font-en font-black text-emerald-600 text-lg">{isLoading ? '...' : formatNumber(stats?.salesCount)}</span>
                                </div>
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">فروش به عادی</span>
                                    <span className="font-en font-bold text-slate-800 text-sm">{isLoading ? '...' : formatNumber(stats?.salesNormal)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">فروش به ویژه</span>
                                    <span className="font-en font-bold text-emerald-600 text-sm">{isLoading ? '...' : formatNumber(stats?.salesSub)}</span>
                                </div>
                            </div>

                            <div className="glass-card rounded-2xl p-4 fade-in flex flex-col justify-center border-r-4 border-r-teal-500 w-full">
                                <div className="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                                    <h4 className="text-slate-500 text-[11px] font-bold"><i className="fa-solid fa-money-bill-trend-up ml-1"></i> مجموع فروش (GMV)</h4>
                                </div>
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">GMV عادی</span>
                                    <span className="font-en font-bold text-slate-800 text-[11px]">{isLoading ? '...' : formatCurrency(stats?.gmvNormal)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">GMV ویژه</span>
                                    <span className="font-en font-bold text-teal-600 text-[11px]">{isLoading ? '...' : formatCurrency(stats?.gmvSub)}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Section 2: Demand Items & Operations */}
                    <div>
                        <h2 className="text-base sm:text-lg font-bold text-slate-700 mb-3 sm:mb-4 flex items-center gap-2 mt-4">
                            <span className="bg-purple-100 text-purple-600 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-boxes-stacked"></i></span>
                            وضعیت اقلام تقاضا (Demand Items)
                        </h2>
                        
                        <div className="mobile-box-grid sm:grid sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-4">
                            <KpiBox title="تعداد کل اقلام تقاضا" value={formatNumber(stats?.totalItems)} icon="fa-box" color="purple" isLoading={isLoading} />
                            
                            <div className="glass-card rounded-2xl p-4 fade-in flex flex-col justify-center border-r-4 border-r-purple-400 w-full">
                                <h4 className="text-slate-500 text-xs font-semibold mb-2 sm:mb-3">تفکیک اقلام (عادی / ویژه)</h4>
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">عادی</span>
                                    <span className="font-en font-bold text-slate-800 text-sm sm:text-base">{isLoading ? '...' : formatNumber(stats?.itemsNormal)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">اشتراک ویژه</span>
                                    <span className="font-en font-bold text-purple-600 text-sm sm:text-base">{isLoading ? '...' : formatNumber(stats?.itemsSub)}</span>
                                </div>
                            </div>

                            <div className="glass-card rounded-2xl p-4 fade-in flex flex-col justify-center border-r-4 border-r-amber-400 w-full">
                                <h4 className="text-slate-500 text-xs font-semibold mb-3">زمان‌سنجی عملکرد</h4>
                                <div className="grid grid-cols-[auto_1fr_1fr] gap-x-2 gap-y-2 items-center text-center">
                                    {/* Headers */}
                                    <div></div>
                                    <div className="text-[10px] text-slate-400 font-medium whitespace-nowrap">تا پاسخ</div>
                                    <div className="text-[10px] text-slate-400 font-medium whitespace-nowrap">تا تامین</div>
                                    
                                    {/* Normal */}
                                    <div className="text-[11px] font-medium text-slate-600 text-right pr-1">عادی</div>
                                    <div className="text-[12px] font-en font-bold text-slate-700 bg-slate-50 py-1 rounded">{isLoading ? '...' : stats?.responseDelayAvgNormal?.toFixed(1)}<span className="text-[9px] text-slate-400 ml-0.5 font-normal">h</span></div>
                                    <div className="text-[12px] font-en font-bold text-amber-600 bg-amber-50 py-1 rounded">{isLoading ? '...' : stats?.fulfillmentDelayAvgNormal?.toFixed(1)}<span className="text-[9px] text-amber-400 ml-0.5 font-normal">h</span></div>
                                    
                                    {/* VIP */}
                                    <div className="text-[11px] font-medium text-purple-600 text-right pr-1">ویژه</div>
                                    <div className="text-[12px] font-en font-bold text-purple-700 bg-purple-50 py-1 rounded">{isLoading ? '...' : stats?.responseDelayAvgSub?.toFixed(1)}<span className="text-[9px] text-purple-400 ml-0.5 font-normal">h</span></div>
                                    <div className="text-[12px] font-en font-bold text-emerald-600 bg-emerald-50 py-1 rounded">{isLoading ? '...' : stats?.fulfillmentDelayAvgSub?.toFixed(1)}<span className="text-[9px] text-emerald-400 ml-0.5 font-normal">h</span></div>
                                </div>
                            </div>

                            <div className="glass-card rounded-2xl p-4 fade-in flex flex-col justify-center border-r-4 border-r-emerald-400 w-full">
                                <h4 className="text-slate-500 text-xs font-semibold mb-2 sm:mb-3">درصد تامین موفق اقلام</h4>
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">عادی</span>
                                    <span className="font-en font-bold text-slate-800 text-sm sm:text-base">{isLoading ? '...' : `${stats?.fulfillmentRateNormal?.toFixed(1)}%`}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-[11px] sm:text-xs font-medium text-slate-600">اشتراک ویژه</span>
                                    <span className="font-en font-bold text-emerald-600 text-sm sm:text-base">{isLoading ? '...' : `${stats?.fulfillmentRateSub?.toFixed(1)}%`}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Section 3: Sales Funnel (Conversion) */}
                    <div>
                        <h2 className="text-base sm:text-lg font-bold text-slate-700 mb-3 sm:mb-4 flex items-center gap-2 mt-4">
                            <span className="bg-amber-100 text-amber-600 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-filter-circle-dollar"></i></span>
                            قیف فروش و تبدیل (Sales Funnel)
                        </h2>
                        
                        <div className="glass-card rounded-2xl p-6 fade-in border-r-4 border-r-amber-500 w-full mb-8">
                            <p className="text-[11px] text-slate-500 mb-6 text-center md:text-right font-medium">از کل اقلامی که تیم تامین موفق به تهیه آن‌ها شده، چه تعداد در نهایت توسط مشتری در فاکتور پرداخت شده‌اند؟</p>
                            
                            <div className="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-8">
                                {/* Step 1: Fulfilled */}
                                <div className="flex flex-col items-center text-center">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-2xl mb-3 shadow-inner">
                                        <i className="fa-solid fa-box-open"></i>
                                    </div>
                                    <span className="text-sm font-bold text-slate-700">اقلام تامین شده</span>
                                    <span className="font-en font-black text-xl text-slate-800 mt-1">{isLoading ? '...' : formatNumber(stats?.fulfilledItems)}</span>
                                </div>

                                {/* Arrow / Funnel Line */}
                                <div className="hidden md:flex flex-col items-center px-4">
                                    <div className="h-0.5 w-16 bg-slate-200 relative">
                                        <i className="fa-solid fa-caret-left absolute -left-1 -top-2 text-slate-300 text-lg"></i>
                                    </div>
                                </div>
                                <div className="flex md:hidden flex-col items-center py-2 text-slate-300">
                                    <i className="fa-solid fa-caret-down text-lg"></i>
                                </div>

                                {/* Step 2: Sold */}
                                <div className="flex flex-col items-center text-center">
                                    <div className="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center text-2xl mb-3 shadow-inner">
                                        <i className="fa-solid fa-file-invoice-dollar"></i>
                                    </div>
                                    <span className="text-sm font-bold text-slate-700">اقلام فاکتور شده (فروخته شده)</span>
                                    <span className="font-en font-black text-xl text-emerald-600 mt-1">{isLoading ? '...' : formatNumber(stats?.soldItems)}</span>
                                </div>

                                {/* Conversion Result */}
                                <div className="w-full md:w-auto mt-6 md:mt-0 md:mr-8 bg-amber-50 p-5 rounded-2xl border border-amber-100 flex flex-col items-center justify-center flex-1">
                                    <span className="text-xs font-bold text-amber-700 mb-2 bg-amber-100/50 px-3 py-1 rounded-full">نرخ تبدیل تامین به فروش</span>
                                    <span className="font-en font-black text-4xl text-amber-600 tracking-tighter" dir="ltr">
                                        {isLoading ? '...' : `${stats?.funnelConversion?.toFixed(1)}%`}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Section 4: Alerts & Warnings */}
                    <div>
                        <h2 className="text-base sm:text-lg font-bold text-slate-700 mb-3 sm:mb-4 flex items-center gap-2 mt-4">
                            <span className="bg-red-100 text-red-600 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-bell"></i></span>
                            هشدارهای سیستم (نیازمند پیگیری)
                        </h2>
                        
                        <div className="glass-card rounded-2xl p-0 overflow-hidden fade-in border-r-4 border-r-red-500 w-full mb-8">
                            <div className="p-4 sm:p-5 bg-white border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <div>
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                                        تقاضاهای بدون اقدام و معطل (بیش از ۴۸ ساعت کاری)
                                    </h3>
                                    <p className="text-xs text-slate-500 mt-1">
                                        تقاضاهایی که بیش از ۴۸ ساعت کاری (بدون احتساب روزهای جمعه) از ثبت آن‌ها گذشته و هیچ عملیاتی روی آن‌ها انجام نشده است.
                                    </p>
                                </div>
                                
                                <div className="flex bg-slate-100 p-1 rounded-xl shrink-0 self-end sm:self-auto">
                                    <button 
                                        onClick={() => setUnactedTab('period')}
                                        className={`px-4 py-2 text-xs font-bold rounded-lg transition-colors ${unactedTab === 'period' ? 'bg-white text-red-600 shadow-sm' : 'text-slate-500 hover:bg-slate-200'}`}
                                    >
                                        در این دوره ({isLoading ? '...' : unactedData.period.length})
                                    </button>
                                    <button 
                                        onClick={() => setUnactedTab('overall')}
                                        className={`px-4 py-2 text-xs font-bold rounded-lg transition-colors ${unactedTab === 'overall' ? 'bg-white text-red-600 shadow-sm' : 'text-slate-500 hover:bg-slate-200'}`}
                                    >
                                        کل سیستم ({isLoading ? '...' : unactedData.overall.length})
                                    </button>
                                </div>
                            </div>
                            
                            <div className="max-h-[300px] overflow-y-auto p-4 sm:p-5 bg-slate-50/50">
                                {isLoading ? (
                                    <div className="text-center py-8 text-slate-400">در حال بررسی...</div>
                                ) : unactedData[unactedTab].length === 0 ? (
                                    <div className="text-center py-8 text-slate-400">
                                        <i className="fa-solid fa-check-circle text-3xl mb-2 text-emerald-400"></i>
                                        <p className="text-sm">همه تقاضاهای موجود در این لیست بررسی شده‌اند و پرونده بازِ معطلی وجود ندارد.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                        {unactedData[unactedTab].map(d => {
                                            const gDate = new Date(d.createdat);
                                            const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                                            const timeStr = gDate.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                                            const dateStr = `${j.jy}/${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')} - ${timeStr}`;
                                            
                                            // نمایش زمان معطلی با احتساب ساعات کاری (برای دقت در داشبورد)
                                            const hoursPassed = Math.floor(calculateWorkingHours(gDate, new Date()));
                                            
                                            return (
                                                <div key={d.id} className="bg-white border border-red-100 rounded-xl p-3 shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-xs font-bold text-slate-700">کد: <span className="font-en text-brand-600">{d.id.substring(0, 8)}</span></span>
                                                        {d.is_emergency && <span className="bg-red-100 text-red-600 text-[10px] px-1.5 py-0.5 rounded font-bold">فوری</span>}
                                                    </div>
                                                    <div className="text-[11px] text-slate-500 flex items-center gap-1 mb-1">
                                                        <i className="fa-regular fa-clock"></i> {dateStr}
                                                    </div>
                                                    <div className="text-[11px] text-red-500 font-bold flex items-center gap-1" title="بدون احتساب روزهای جمعه">
                                                        <i className="fa-solid fa-hourglass-half"></i> معطل: <span className="font-en">{hoursPassed}h</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Charts Area */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
                        <div className="lg:col-span-2 glass-card rounded-2xl p-4 sm:p-5 fade-in">
                            <h3 className="text-xs sm:text-sm font-bold text-slate-700 mb-4 sm:mb-6">روند تقاضا و اقلام در این دوره</h3>
                            <div className="h-[250px] sm:h-[300px] w-full" dir="ltr">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={chartData} margin={{ top: 10, right: 0, left: 0, bottom: 0 }}>
                                        <defs>
                                            <linearGradient id="cItems" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#a855f7" stopOpacity={0.3}/><stop offset="95%" stopColor="#a855f7" stopOpacity={0}/></linearGradient>
                                            <linearGradient id="cDemand" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                        <XAxis dataKey="name" tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                                        <Tooltip contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 15px rgba(0,0,0,0.08)', fontFamily: 'Vazirmatn', textAlign: 'right', fontSize: '12px'}} />
                                        <Legend wrapperStyle={{fontSize: '11px', fontFamily: 'Vazirmatn', paddingTop: '10px'}} />
                                        <Area type="monotone" name="اقلام (Items)" dataKey="کل اقلام" stroke="#a855f7" strokeWidth={2} fill="url(#cItems)" />
                                        <Area type="monotone" name="تقاضا (Demands)" dataKey="عادی" stroke="#3b82f6" strokeWidth={2} fill="url(#cDemand)" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                        
                        <div className="glass-card rounded-2xl p-4 sm:p-5 fade-in">
                            <h3 className="text-xs sm:text-sm font-bold text-slate-700 mb-1">ارزش فروش روزانه (GMV)</h3>
                            <p className="text-[10px] sm:text-xs text-slate-500 mb-4 sm:mb-6">بر اساس quantity * sale_price</p>
                            <div className="h-[200px] sm:h-[250px] w-full" dir="ltr">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={chartData} margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                                        <Tooltip cursor={{fill: '#f8fafc'}} formatter={(val) => [formatNumber(val) + ' ت', 'GMV']} contentStyle={{fontSize:'12px', fontFamily:'Vazirmatn', borderRadius:'8px', border:'none', boxShadow:'0 4px 10px rgba(0,0,0,0.1)'}} />
                                        <Bar dataKey="GMV" fill="#10b981" radius={[4, 4, 0, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
