        const supabaseKey = typeof __supabase_anon_key !== 'undefined' ? __supabase_anon_key : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlaHlqYXRvdGJ6eGFyZ254YXNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE5MTIwMjEsImV4cCI6MjA2NzQ4ODAyMX0.2R448DuEBlTrNvaYXiYZ8D5M7MJNv7n1qmIDHQBNFiY';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const ADMIN_ROLE_ID = 1;

        // ==========================================
        // 2. Helper Functions & Config
        // ==========================================
        const formatCurrency = (value) => {
            if (!value) return '۰ تومان';
            if (value >= 1e9) return (value / 1e9).toFixed(2) + ' میلیارد تومان';
            if (value >= 1e6) return (value / 1e6).toFixed(1) + ' میلیون تومان';
            return value.toLocaleString('fa-IR') + ' تومان';
        };

        const formatNumber = (num) => Number(num || 0).toLocaleString('fa-IR');

        const calculateWorkingHours = (startDate, endDate) => {
            if (startDate >= endDate) return 0;
            const totalMs = endDate.getTime() - startDate.getTime();
            
            let fridaysMs = 0;
            let current = new Date(startDate);
            current.setHours(0, 0, 0, 0); 
            
            let endDay = new Date(endDate);
            endDay.setHours(0, 0, 0, 0);
            
            while(current <= endDay) {
                if (current.getDay() === 5) { 
                    let fridayStart = new Date(current);
                    let fridayEnd = new Date(current);
                    fridayEnd.setHours(23, 59, 59, 999);
                    
                    let overlapStart = Math.max(startDate.getTime(), fridayStart.getTime());
                    let overlapEnd = Math.min(endDate.getTime(), fridayEnd.getTime());
                    
                    if (overlapStart < overlapEnd) {
                        fridaysMs += (overlapEnd - overlapStart);
                    }
                }
                current.setDate(current.getDate() + 1);
            }
            
            return (totalMs - fridaysMs) / (1000 * 60 * 60);
        };

        const getPersianWeekday = (date) => {
            const weekdays = ['یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه', 'شنبه'];
            return weekdays[date.getDay()];
        };

        // --- OKR Metrics Configuration ---
        const AVAILABLE_METRICS = [
            { key: 'gmv', label: 'ارزش کل فروش (GMV)', isCurrency: true },
            { key: 'salesCount', label: 'تعداد کل فاکتورهای فروش', isCurrency: false },
            { key: 'totalDemands', label: 'تعداد کل تقاضاها', isCurrency: false },
            { key: 'totalNewUsers', label: 'کل کاربران جدید', isCurrency: false },
            { key: 'newCustomers', label: 'مشتریان جدید', isCurrency: false },
            { key: 'newSuppliers', label: 'تامین‌کنندگان جدید', isCurrency: false },
            { key: 'newBuyers', label: 'خریداران بار اول', isCurrency: false },
            { key: 'totalItems', label: 'تعداد کل اقلام تقاضا', isCurrency: false },
            { key: 'fulfilledItems', label: 'تعداد اقلام تامین‌شده', isCurrency: false },
            { key: 'soldItems', label: 'تعداد اقلام فروخته‌شده', isCurrency: false },
            { key: 'diversityRequested', label: 'تنوع کالای درخواستی (یونیک)', isCurrency: false },
            { key: 'diversitySold', label: 'تنوع کالای فروخته‌شده (یونیک)', isCurrency: false },
            { key: 'funnelConversion', label: 'نرخ تبدیل تقاضا به فروش (%)', isCurrency: false, isPercent: true },
            { key: 'fulfillmentRateNormal', label: 'درصد تامین موفق (عادی)', isCurrency: false, isPercent: true },
            { key: 'fulfillmentRateSub', label: 'درصد تامین موفق (اشتراکی)', isCurrency: false, isPercent: true }
        ];

        const formatOkrValue = (val, metricKey) => {
            const metric = AVAILABLE_METRICS.find(m => m.key === metricKey);
            if (metric?.isCurrency) return formatCurrency(val);
            if (metric?.isPercent) return val.toFixed(1) + '%';
            return formatNumber(val);
        };

        // Engine to calculate a specific metric from an array of marketing_daily_stats
        const computeMetricFromStats = (dailyStats, metricKey) => {
            const sum = (k) => (dailyStats || []).reduce((acc, curr) => acc + (Number(curr[k]) || 0), 0);
            
            switch(metricKey) {
                case 'gmv': return sum('total_gmv');
                case 'salesCount': return sum('sales_count');
                case 'totalDemands': return sum('total_demands');
                case 'totalNewUsers': return sum('new_customers') + sum('new_suppliers');
                case 'newCustomers': return sum('new_customers');
                case 'newSuppliers': return sum('new_suppliers');
                case 'newBuyers': return sum('new_buyers');
                case 'totalItems': return sum('total_items');
                case 'fulfilledItems': return sum('fulfilled_items');
                case 'soldItems': return sum('sold_items');
                case 'diversityRequested': return sum('unique_products_requested');
                case 'diversitySold': return sum('unique_products_sold');
                case 'funnelConversion': return sum('fulfilled_items') > 0 ? (sum('sold_items') / sum('fulfilled_items')) * 100 : 0;
                case 'fulfillmentRateNormal': return sum('items_normal') > 0 ? (sum('fulfilled_items_normal') / sum('items_normal')) * 100 : 0;
                case 'fulfillmentRateSub': return sum('items_sub') > 0 ? (sum('fulfilled_items_sub') / sum('items_sub')) * 100 : 0;
                default: return 0;
            }
        };

        // Function to generate the structured weeks for a given Persian season
        const getSeasonWeeks = (year, season) => {
            const startMonth = (season - 1) * 3 + 1;
            const endMonth = season * 3;
            const endDay = jalaali.jalaaliMonthLength(year, endMonth);

            const sG = jalaali.toGregorian(year, startMonth, 1);
            const eG = jalaali.toGregorian(year, endMonth, endDay);

            const startDate = new Date(sG.gy, sG.gm - 1, sG.gd);
            const endDate = new Date(eG.gy, eG.gm - 1, eG.gd);

            // Find the first Saturday on or before the start of the season
            const startWeekday = startDate.getDay(); 
            const persianWeekday = (startWeekday + 1) % 7; 
            
            let currentWeekStart = new Date(startDate);
            currentWeekStart.setDate(currentWeekStart.getDate() - persianWeekday);

            const weeks = [];
            let weekNum = 1;

            while (currentWeekStart <= endDate) {
                let weekEnd = new Date(currentWeekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                
                weeks.push({
                    weekNum,
                    label: `هفته ${weekNum}`,
                    start: new Date(currentWeekStart),
                    end: new Date(weekEnd),
                    records: [] // Array to hold daily stats
                });
                
                currentWeekStart.setDate(currentWeekStart.getDate() + 7);
                weekNum++;
            }
            return weeks;
        };

        // ==========================================
        // 3. UI Components (Box Design)
        // ==========================================
        const KpiBox = ({ title, value, subtitle, icon, color, isLoading }) => {
            const colorClasses = {
                blue: 'bg-blue-50 text-blue-600 border-blue-100',
                emerald: 'bg-emerald-50 text-emerald-600 border-emerald-100',
                purple: 'bg-purple-50 text-purple-600 border-purple-100',
                amber: 'bg-amber-50 text-amber-600 border-amber-100',
                rose: 'bg-rose-50 text-rose-600 border-rose-100',
                slate: 'bg-slate-50 text-slate-600 border-slate-200',
                cyan: 'bg-cyan-50 text-cyan-600 border-cyan-100',
                teal: 'bg-teal-50 text-teal-600 border-teal-100',
                pink: 'bg-pink-50 text-pink-600 border-pink-100',
                indigo: 'bg-indigo-50 text-indigo-600 border-indigo-100',
                sky: 'bg-sky-50 text-sky-600 border-sky-100'
            };

            return (
                <div className="glass-card rounded-2xl p-4 sm:p-5 flex items-center gap-4 fade-in w-full transition-shadow hover:shadow-card">
                    <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center text-xl sm:text-2xl border shrink-0 ${colorClasses[color]}`}>
                        <i className={`fa-solid ${icon}`}></i>
                    </div>
                    <div className="flex-1 min-w-0">
                        <h4 className="text-slate-500 text-xs sm:text-[13px] font-semibold mb-1 truncate">{title}</h4>
                        <div className="flex items-baseline gap-1.5 flex-wrap">
                            {isLoading ? (
                                <div className="h-7 w-20 bg-slate-200 animate-pulse rounded"></div>
                            ) : (
                                <span className="text-xl sm:text-2xl font-black text-slate-800 font-en tracking-tight">{value}</span>
                            )}
                            {subtitle && !isLoading && <span className="text-[10px] sm:text-xs text-slate-400 font-medium whitespace-nowrap">{subtitle}</span>}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. Main Dashboard Component
        // ==========================================
        const Dashboard = () => {
            const [isAuthorized, setIsAuthorized] = React.useState(false);
            const [authLoading, setAuthLoading] = React.useState(true);

            // Tab State
            const [activeTab, setActiveTab] = React.useState('dashboard');

            // --- OKR States ---
            const [okrs, setOkrs] = React.useState(() => {
                const saved = localStorage.getItem('bazaario_marketing_okrs');
                return saved ? JSON.parse(saved) : [];
            });
            // Form & View Filters for OKR
            const [viewOkrYear, setViewOkrYear] = React.useState(1405);
            const [viewOkrSeason, setViewOkrSeason] = React.useState(1);
            const [newOkrOwner, setNewOkrOwner] = React.useState('');
            const [newOkrMetric, setNewOkrMetric] = React.useState('gmv');
            const [newOkrTargetType, setNewOkrTargetType] = React.useState('weekly_growth'); // 'cumulative' or 'weekly_growth'
            const [newOkrTarget, setNewOkrTarget] = React.useState('');
            const [isSubmittingOkr, setIsSubmittingOkr] = React.useState(false);
            
            // OKR Daily Stats (Fetched specifically for the selected OKR season)
            const [okrDailyStats, setOkrDailyStats] = React.useState([]);

            // --- Dashboard Global Filter States ---
            const [selectedYear, setSelectedYear] = React.useState(1405);
            const [filterType, setFilterType] = React.useState('seasonal');
            const [selectedPeriod, setSelectedPeriod] = React.useState(1);

            // Dashboard Data States
            const [dbData, setDbData] = React.useState([]);
            const [stats, setStats] = React.useState(null);
            const [overallTotals, setOverallTotals] = React.useState({ customers: 0, suppliers: 0, products: 0 });
            
            const [unactedData, setUnactedData] = React.useState({ period: [], overall: [] });
            const [unactedTab, setUnactedTab] = React.useState('period'); 
            
            const [isLoading, setIsLoading] = React.useState(false);
            const [isOkrLoading, setIsOkrLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            // Persist OKRs to local storage
            React.useEffect(() => {
                localStorage.setItem('bazaario_marketing_okrs', JSON.stringify(okrs));
            }, [okrs]);

            React.useEffect(() => {
                const verifyAuth = async () => {
                    try {
                        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                        if (sessionError || !session) {
                            setIsAuthorized(false);
                            return;
                        }

                        const { data: profile, error: profileError } = await supabase
                            .from('profiles')
                            .select('roleid')
                            .eq('id', session.user.id)
                            .single();

                        if (profileError || !profile || profile.roleid !== ADMIN_ROLE_ID) {
                            alert('شما دسترسی لازم برای مشاهده این داشبورد را ندارید.');
                            setIsAuthorized(false);
                            return;
                        }

                        setIsAuthorized(true);
                    } catch (err) {
                        setIsAuthorized(false);
                    } finally {
                        setAuthLoading(false);
                    }
                };

                verifyAuth();

                const { data: authListener } = supabase.auth.onAuthStateChange((event) => {
                    if (event === 'SIGNED_OUT') setIsAuthorized(false);
                });

                return () => {
                    if (authListener && authListener.subscription) authListener.subscription.unsubscribe();
                };
            }, []);

            const getPeriodOptions = () => {
                if (filterType === 'seasonal') return [ { value: 1, label: 'فصل اول (بهار)' }, { value: 2, label: 'فصل دوم (تابستان)' }, { value: 3, label: 'فصل سوم (پاییز)' }, { value: 4, label: 'فصل چهارم (زمستان)' } ];
                if (filterType === 'monthly') return ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'].map((m, i) => ({ value: i + 1, label: m }));
                if (filterType === 'weekly') return Array.from({length: 52}, (_, i) => ({ value: i + 1, label: `هفته ${i + 1}` }));
                return [];
            };

            // محاسبه تاریخ میلادی شروع و پایان برای فیلتر گلوبال داشبورد
            const { startGDate, endGDate } = React.useMemo(() => {
                let sGDate, eGDate;

                if (filterType === 'seasonal') {
                    const startMonth = (selectedPeriod - 1) * 3 + 1;
                    const endMonth = selectedPeriod * 3;
                    const startDay = 1;
                    const endDay = jalaali.jalaaliMonthLength(selectedYear, endMonth);
                    
                    const sG = jalaali.toGregorian(selectedYear, startMonth, startDay);
                    const eG = jalaali.toGregorian(selectedYear, endMonth, endDay);
                    
                    sGDate = new Date(sG.gy, sG.gm - 1, sG.gd);
                    eGDate = new Date(eG.gy, eG.gm - 1, eG.gd);
                } else if (filterType === 'monthly') {
                    const startMonth = selectedPeriod;
                    const endMonth = selectedPeriod;
                    const startDay = 1;
                    const endDay = jalaali.jalaaliMonthLength(selectedYear, endMonth);
                    
                    const sG = jalaali.toGregorian(selectedYear, startMonth, startDay);
                    const eG = jalaali.toGregorian(selectedYear, endMonth, endDay);
                    
                    sGDate = new Date(sG.gy, sG.gm - 1, sG.gd);
                    eGDate = new Date(eG.gy, eG.gm - 1, eG.gd);
                } else if (filterType === 'weekly') {
                    const f1G = jalaali.toGregorian(selectedYear, 1, 1);
                    const f1Date = new Date(f1G.gy, f1G.gm - 1, f1G.gd);
                    
                    const f1Weekday = f1Date.getDay(); 
                    const persianWeekday = (f1Weekday + 1) % 7; 
                    
                    const week1Start = new Date(f1Date);
                    week1Start.setDate(week1Start.getDate() - persianWeekday);
                    
                    sGDate = new Date(week1Start);
                    sGDate.setDate(sGDate.getDate() + (selectedPeriod - 1) * 7);
                    
                    eGDate = new Date(sGDate);
                    eGDate.setDate(eGDate.getDate() + 6);
                }
                
                return { startGDate: sGDate, endGDate: eGDate };
            }, [selectedYear, filterType, selectedPeriod]);

            // تولید رشته‌ی تاریخ برای نمایش به کاربر
            const periodDateRange = React.useMemo(() => {
                if (!startGDate || !endGDate) return '';
                
                const sJ = jalaali.toJalaali(startGDate.getFullYear(), startGDate.getMonth() + 1, startGDate.getDate());
                const eJ = jalaali.toJalaali(endGDate.getFullYear(), endGDate.getMonth() + 1, endGDate.getDate());
                
                const startStr = `${sJ.jy}/${String(sJ.jm).padStart(2,'0')}/${String(sJ.jd).padStart(2,'0')}`;
                const endStr = `${eJ.jy}/${String(eJ.jm).padStart(2,'0')}/${String(eJ.jd).padStart(2,'0')}`;
                
                return `${getPersianWeekday(startGDate)} ${startStr} تا ${getPersianWeekday(endGDate)} ${endStr}`;
            }, [startGDate, endGDate]);

            const handlePrev = () => {
                if (selectedPeriod > 1) {
                    setSelectedPeriod(prev => prev - 1);
                } else {
                    setSelectedYear(prev => prev - 1);
                    if (filterType === 'seasonal') setSelectedPeriod(4);
                    else if (filterType === 'monthly') setSelectedPeriod(12);
                    else if (filterType === 'weekly') setSelectedPeriod(52);
                }
            };

            const handleNext = () => {
                let max = filterType === 'seasonal' ? 4 : filterType === 'monthly' ? 12 : 52;
                if (selectedPeriod < max) {
                    setSelectedPeriod(prev => prev + 1);
                } else {
                    setSelectedYear(prev => prev + 1);
                    setSelectedPeriod(1);
                }
            };

            React.useEffect(() => { setSelectedPeriod(1); }, [filterType]);

            // ==========================================
            // Global Dashboard Fetching
            // ==========================================
            React.useEffect(() => {
                if (!isAuthorized || !startGDate || !endGDate) return;

                const fetchPeriodData = async () => {
                    setIsLoading(true);
                    setError(null);
                    try {
                        const SAFE_CHUNK_SIZE = 100;
                        
                        const startDateStr = startGDate.toISOString().split('T')[0];
                        const endDateStr = endGDate.toISOString().split('T')[0];
                        
                        const startDateFull = new Date(startGDate.getFullYear(), startGDate.getMonth(), startGDate.getDate(), 0, 0, 0).toISOString();
                        const endDateFull = new Date(endGDate.getFullYear(), endGDate.getMonth(), endGDate.getDate(), 23, 59, 59).toISOString();

                        // 1. Fetch Aggregated Data 
                        const { data: dailyStats, error: statsError } = await supabase
                            .from('marketing_daily_stats')
                            .select('*')
                            .gte('record_date', startDateStr)
                            .lte('record_date', endDateStr)
                            .order('record_date', { ascending: true });

                        if (statsError) throw new Error(`خطا در جدول تجمیعی: ${statsError.message}`);

                        // 2. Chart Data mapping
                        const chartDataMap = [];
                        let currentDay = new Date(startGDate);
                        currentDay.setHours(0,0,0,0);
                        const endDayNoTime = new Date(endGDate);
                        endDayNoTime.setHours(0,0,0,0);

                        const dbLookup = {};
                        (dailyStats || []).forEach(d => { dbLookup[d.record_date] = d; });

                        while (currentDay <= endDayNoTime) {
                            const dateStrKey = currentDay.toISOString().split('T')[0];
                            const j = jalaali.toJalaali(currentDay.getFullYear(), currentDay.getMonth() + 1, currentDay.getDate());
                            
                            const dRecord = dbLookup[dateStrKey] || {};
                            
                            chartDataMap.push({
                                name: `${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')}`,
                                'عادی': dRecord.demands_normal || 0,
                                'اشتراکی': dRecord.demands_sub || 0,
                                'GMV': Number(dRecord.total_gmv) || 0,
                                'کل اقلام': dRecord.total_items || 0,
                                'اقلام تامین شده': dRecord.fulfilled_items || 0
                            });
                            
                            currentDay.setDate(currentDay.getDate() + 1);
                        }
                        
                        setDbData(chartDataMap);

                        // 3. KPI Aggregation
                        const sum = (key) => (dailyStats || []).reduce((acc, curr) => acc + (Number(curr[key]) || 0), 0);
                        const avg = (key) => {
                            const validDays = (dailyStats || []).filter(d => Number(d[key]) > 0);
                            if (validDays.length === 0) return 0;
                            const total = validDays.reduce((acc, curr) => acc + Number(curr[key]), 0);
                            return total / validDays.length;
                        };
                        
                        let latestCust = 0, latestSupp = 0, latestProd = 0;
                        if (dailyStats && dailyStats.length > 0) {
                            const last = dailyStats[dailyStats.length - 1];
                            latestCust = last.total_customers_overall;
                            latestSupp = last.total_suppliers_overall;
                            latestProd = last.total_products_overall;

                                        {isLoading ? (
                                            <div className="text-center py-8 text-slate-400">در حال بررسی...</div>
                                        ) : unactedData[unactedTab].length === 0 ? (
                                            <div className="text-center py-8 text-slate-400">
                                                <i className="fa-solid fa-check-circle text-3xl mb-2 text-emerald-400"></i>
                                                <p className="text-sm">همه تقاضاهای موجود در این لیست بررسی شده‌اند و پرونده بازِ معطلی وجود ندارد.</p>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                                    {unactedData[unactedTab].slice(0, 60).map(d => {
                                                        const profile = d.customerProfile;
                                                        
                                                        const fName = profile?.first_name || profile?.firstname || profile?.name || '';
                                                        const lName = profile?.last_name || profile?.lastname || profile?.surname || profile?.family_name || profile?.familyname || '';
                                                        let fullName = profile?.full_name || profile?.fullname || `${fName} ${lName}`.trim();
                                                        
                                                        if (!fullName && profile?.raw_user_meta_data) {
                                                            const meta = typeof profile.raw_user_meta_data === 'string' ? JSON.parse(profile.raw_user_meta_data) : profile.raw_user_meta_data;
                                                            const mFName = meta?.first_name || meta?.name || '';
                                                            const mLName = meta?.last_name || meta?.surname || meta?.family_name || '';
                                                            fullName = meta?.full_name || `${mFName} ${mLName}`.trim();
                                                        }
                                                        
                                                        if (!fullName || fullName.trim() === '') fullName = 'مشتری نامشخص';
                                                        
                                                        let cityName = profile?.city || profile?.city_name || profile?.cityname || profile?.province || profile?.city_id || '';
                                                        const cityText = cityName ? `(${cityName})` : '';

                                                        const gDate = new Date(d.createdat);
                                                        const j = jalaali.toJalaali(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
                                                        const timeStr = gDate.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
                                                        const dateStr = `${j.jy}/${String(j.jm).padStart(2,'0')}/${String(j.jd).padStart(2,'0')} - ${timeStr}`;
                                                        const hoursPassed = Math.floor(calculateWorkingHours(gDate, new Date()));
                                                        
                                                        return (
                                                            <div key={d.id} className="bg-white border border-red-100 rounded-xl p-3 shadow-sm hover:shadow-md transition-shadow">
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <span className="text-xs font-bold text-slate-700">کد: <span className="font-en text-brand-600">{String(d.id).substring(0, 8)}</span></span>
                                                                    {d.is_emergency && <span className="bg-red-100 text-red-600 text-[10px] px-1.5 py-0.5 rounded font-bold">فوری</span>}
                                                                </div>
                                                                
                                                                <div className="text-[11px] font-bold text-slate-700 mb-1.5 flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border border-slate-100">
                                                                    <i className="fa-solid fa-user-circle text-slate-400 text-[14px]"></i> 
                                                                    <span className="truncate">{fullName} <span className="text-slate-500 font-normal">{cityText}</span></span>
                                                                </div>

                                                                <div className="flex justify-between items-center mt-2">
                                                                    <div className="text-[10px] text-slate-500 flex items-center gap-1">
                                                                        <i className="fa-regular fa-clock"></i> {dateStr}
                                                                    </div>
                                                                    <div className="text-[10px] text-red-500 font-bold flex items-center gap-1" title="بدون احتساب روزهای جمعه">
                                                                        <i className="fa-solid fa-hourglass-half"></i> معطل: <span className="font-en">{hoursPassed}h</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                {unactedData[unactedTab].length > 60 && (
                                                    <div className="mt-4 bg-white/50 border border-slate-200 border-dashed rounded-xl p-3 flex items-center justify-center text-slate-500 text-xs font-bold shadow-sm">
                                                        و {formatNumber(unactedData[unactedTab].length - 60)} مورد دیگر ...
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Section 6: Charts Area */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
                                <div className="lg:col-span-2 glass-card rounded-2xl p-4 sm:p-5">
                                    <h3 className="text-xs sm:text-sm font-bold text-slate-700 mb-4 sm:mb-6">روند تقاضا و اقلام در این دوره</h3>
                                    <div className="h-[250px] sm:h-[300px] w-full" dir="ltr">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={chartData} margin={{ top: 10, right: 0, left: 0, bottom: 0 }}>
                                                <defs>
                                                    <linearGradient id="cItems" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#a855f7" stopOpacity={0.3}/><stop offset="95%" stopColor="#a855f7" stopOpacity={0}/></linearGradient>
                                                    <linearGradient id="cDemand" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                <XAxis dataKey="name" tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                                                <Tooltip contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 15px rgba(0,0,0,0.08)', fontFamily: 'Vazirmatn', textAlign: 'right', fontSize: '12px'}} />
                                                <Legend wrapperStyle={{fontSize: '11px', fontFamily: 'Vazirmatn', paddingTop: '10px'}} />
                                                <Area type="monotone" name="اقلام (Items)" dataKey="کل اقلام" stroke="#a855f7" strokeWidth={2} fill="url(#cItems)" />
                                                <Area type="monotone" name="تقاضا (Demands)" dataKey="عادی" stroke="#3b82f6" strokeWidth={2} fill="url(#cDemand)" />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                
                                <div className="glass-card rounded-2xl p-4 sm:p-5">
                                    <h3 className="text-xs sm:text-sm font-bold text-slate-700 mb-1">ارزش فروش روزانه (GMV)</h3>
                                    <div className="h-[200px] sm:h-[250px] w-full" dir="ltr">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={chartData} margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                                                <Tooltip cursor={{fill: '#f8fafc'}} formatter={(val) => [formatNumber(val) + ' ت', 'GMV']} contentStyle={{fontSize:'12px', fontFamily:'Vazirmatn', borderRadius:'8px', border:'none', boxShadow:'0 4px 10px rgba(0,0,0,0.1)'}} />
                                                <Bar dataKey="GMV" fill="#10b981" radius={[4, 4, 0, 0]} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ================================== TAB 2: OKR MANAGEMENT ================================== */}
                    {activeTab === 'okr' && (
                        <div className="flex flex-col gap-6 fade-in mt-2">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <h2 className="text-base sm:text-lg font-bold text-slate-700 flex items-center gap-2">
                                    <span className="bg-indigo-100 text-indigo-600 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-bullseye"></i></span>
                                    مدیریت اهداف کلیدی (OKR)
                                </h2>
                                <div className="text-[11px] text-slate-500 bg-indigo-50 px-3 py-2 rounded-xl border border-indigo-100 shadow-sm leading-relaxed">
                                    <i className="fa-solid fa-circle-info text-indigo-400 ml-1"></i>
                                    <strong>نکته مهم:</strong> اهداف به صورت <strong>فصلی</strong> تعریف می‌شوند و روند پیشرفت هر هدف، هفته به هفته روی نمودار تخصصی آن ترسیم می‌گردد.
                                </div>
                            </div>
                            
                            {/* OKR Creation Form */}
                            <div className="glass-card rounded-2xl p-5 border-t-4 border-t-indigo-500 relative">
                                {isSubmittingOkr && (
                                    <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-10 flex items-center justify-center rounded-2xl">
                                        <div className="flex items-center gap-2 text-indigo-600 font-bold bg-white px-4 py-2 rounded-xl shadow-md">
                                            <i className="fa-solid fa-circle-notch fa-spin"></i> در حال استخراج نقطه شروع از دیتابیس...
                                        </div>
                                    </div>
                                )}
                                <h3 className="text-sm font-bold text-slate-700 mb-4">تعریف هدف جدید</h3>
                                <form onSubmit={handleAddOkr} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 items-end">
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs text-slate-500 font-bold">سال</label>
                                        <select value={viewOkrYear} onChange={e => setViewOkrYear(Number(e.target.value))} className="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 font-en focus:outline-none focus:border-brand-400 cursor-pointer">
                                            <option value={1403}>1403</option><option value={1404}>1404</option><option value={1405}>1405</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs text-slate-500 font-bold">فصل هدف</label>
                                        <select value={viewOkrSeason} onChange={e => setViewOkrSeason(Number(e.target.value))} className="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 font-vazir focus:outline-none focus:border-brand-400 cursor-pointer">
                                            <option value={1}>بهار</option>
                                            <option value={2}>تابستان</option>
                                            <option value={3}>پاییز</option>
                                            <option value={4}>زمستان</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs text-slate-500 font-bold">شاخص کلیدی (KR)</label>
                                        <select value={newOkrMetric} onChange={e => setNewOkrMetric(e.target.value)} className="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 font-vazir focus:outline-none focus:border-brand-400 cursor-pointer">
                                            {AVAILABLE_METRICS.map(m => <option key={m.key} value={m.key}>{m.label}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs text-slate-500 font-bold">نوع هدف‌گذاری</label>
                                        <select value={newOkrTargetType} onChange={e => setNewOkrTargetType(e.target.value)} className="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 font-vazir focus:outline-none focus:border-brand-400 cursor-pointer">
                                            <option value="weekly_growth">رشد هفتگی (مبنا: هفته اول)</option>
                                            <option value="cumulative">تجمعی (مجموع کل فصل)</option>
                                        </select>
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs text-slate-500 font-bold">مسئول (Owner)</label>
                                        <input type="text" value={newOkrOwner} onChange={e => setNewOkrOwner(e.target.value)} placeholder="مثال: تیم فروش" required className="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 font-vazir focus:outline-none focus:border-brand-400" />
                                    </div>
                                    <div className="flex flex-col gap-1.5 relative">
                                        <label className="text-xs text-slate-500 font-bold">هدف (Target)</label>
                                        <input type="number" step="any" value={newOkrTarget} onChange={e => setNewOkrTarget(e.target.value)} placeholder="مقدار هدف نهایی" required className="bg-slate-50 border border-slate-200 text-sm rounded-xl px-3 py-2.5 font-en focus:outline-none focus:border-brand-400" />
                                    </div>
                                    <button type="submit" disabled={isSubmittingOkr} className="xl:col-span-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-bold text-sm py-2.5 px-4 rounded-xl transition-colors h-[42px] flex items-center justify-center gap-2 shadow-sm">
                                        <i className="fa-solid fa-plus"></i> {isSubmittingOkr ? 'در حال ثبت...' : 'ثبت هدف و رسم نمودار'}
                                    </button>
                                </form>
                                <div className="mt-3 text-[10px] text-slate-400 flex items-center gap-1.5 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                    <i className="fa-solid fa-robot"></i> 
                                    <span>نقطه شروع (Baseline) به صورت خودکار محاسبه می‌شود. برای اهداف «تجمعی» نقطه شروع صفر است و برای «رشد هفتگی»، عملکردِ واقعی هفته اول از دیتابیس استخراج می‌شود.</span>
                                </div>
                            </div>

                            {/* Active OKRs Grid */}
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {isOkrLoading ? (
                                    <div className="col-span-full py-12 text-center text-slate-400">در حال دریافت اطلاعات فصل...</div>
                                ) : currentSeasonOkrs.length === 0 ? (
                                    <div className="col-span-full py-12 text-center text-slate-400 bg-slate-50/50 rounded-2xl border border-dashed border-slate-200">
                                        <i className="fa-solid fa-flag-checkered text-4xl mb-3 text-slate-300"></i>
                                        <p>هیچ هدفی برای فصل {seasonNames[viewOkrSeason]} سال {viewOkrYear} ثبت نشده است.</p>
                                    </div>
                                ) : (
                                    currentSeasonOkrs.map(okr => {
                                        // Generate Data for the ComposedChart
                                        const totalWeeks = okrWeeksData.length;
                                        let runningActual = 0;
                                        let lastValidActual = 0;
                                        
                                        const now = new Date();
                                        
                                        const chartData = okrWeeksData.map((w, index) => {
                                            const weeklyActual = computeMetricFromStats(w.records, okr.metricKey);
                                            
                                            let targetVal = 0;
                                            if (okr.targetType === 'cumulative') {
                                                targetVal = okr.baseline + ((okr.target - okr.baseline) / (totalWeeks - 1)) * index;
                                                runningActual += weeklyActual;
                                            } else {
                                                targetVal = okr.baseline + ((okr.target - okr.baseline) / (totalWeeks - 1)) * index;
                                            }
                                            
                                            // Only show actual if the week is not completely in the future
                                            const isFuture = w.start > now;
                                            let finalActual = null;
                                            
                                            if (!isFuture) {
                                                finalActual = okr.targetType === 'cumulative' ? runningActual : weeklyActual;
                                                lastValidActual = finalActual;
                                            }
                                            
                                            return {
                                                name: w.weekNum,
                                                'هدف': Number(targetVal.toFixed(2)),
                                                'عملکرد': finalActual !== null ? Number(finalActual.toFixed(2)) : null
                                            };
                                        });

                                        let rawProgress = 0;
                                        if (okr.target > okr.baseline) {
                                            rawProgress = ((lastValidActual - okr.baseline) / (okr.target - okr.baseline)) * 100;
                                        } else if (okr.target < okr.baseline) {
                                            rawProgress = ((okr.baseline - lastValidActual) / (okr.baseline - okr.target)) * 100;
                                        } else {
                                            rawProgress = lastValidActual >= okr.target ? 100 : 0;
                                        }
                                        
                                        const progressPercent = Math.max(0, Math.min(100, rawProgress));
                                        const isSuccess = rawProgress >= 100;

                                        return (
                                            <div key={okr.id} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-card transition-all relative overflow-hidden group flex flex-col">
                                                <div className={`absolute top-0 right-0 w-1.5 h-full transition-colors ${isSuccess ? 'bg-emerald-400' : 'bg-indigo-400'}`}></div>
                                                
                                                <div className="flex justify-between items-start mb-4 pl-2">
                                                    <div className="flex flex-col gap-2">
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <span className="bg-slate-100 text-slate-600 text-[10px] px-2 py-0.5 rounded-md font-bold border border-slate-200">
                                                                {okr.targetType === 'cumulative' ? 'تجمعی' : 'رشد هفتگی'}
                                                            </span>
                                                            {okr.owner && (
                                                                <span className="bg-indigo-50 text-indigo-700 text-[10px] px-2 py-0.5 rounded-md font-bold border border-indigo-100 flex items-center gap-1">
                                                                    <i className="fa-solid fa-user-tie"></i> {okr.owner}
                                                                </span>
                                                            )}
                                                            <span className={`text-[10px] px-2 py-0.5 rounded-md font-bold border ${isSuccess ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-orange-50 text-orange-600 border-orange-100'}`}>
                                                                {rawProgress.toFixed(1)}% پیشرفت
                                                            </span>
                                                        </div>
                                                        <h4 className="font-bold text-slate-800 text-base">{AVAILABLE_METRICS.find(m => m.key === okr.metricKey)?.label || okr.metricKey}</h4>
                                                    </div>
                                                    <button onClick={() => setOkrs(okrs.filter(o => o.id !== okr.id))} className="text-slate-300 hover:text-red-500 transition-colors bg-slate-50 w-8 h-8 rounded-full flex items-center justify-center" title="حذف این هدف">
                                                        <i className="fa-solid fa-trash text-xs"></i>
                                                    </button>
                                                </div>

                                                {/* Weekly Trend Chart */}
                                                <div className="h-[200px] w-full mt-2 mb-4" dir="ltr">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <ComposedChart data={chartData} margin={{ top: 10, right: 0, left: 0, bottom: 0 }}>
                                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                            <XAxis dataKey="name" tick={{fontSize: 10, fill: '#94a3b8'}} axisLine={false} tickLine={false} tickFormatter={(val) => `هفته ${val}`} />
                                                            <Tooltip 
                                                                contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 4px 15px rgba(0,0,0,0.08)', fontFamily: 'Vazirmatn', textAlign: 'right', fontSize: '11px'}}
                                                                formatter={(val, name) => [formatNumber(val), name === 'هدف' ? 'تارگت' : 'عملکرد واقعی']}
                                                                labelFormatter={(label) => `هفته ${label}`}
                                                            />
                                                            <Legend wrapperStyle={{fontSize: '10px', fontFamily: 'Vazirmatn'}} />
                                                            <Bar dataKey="عملکرد" fill={isSuccess ? "#10b981" : "#818cf8"} radius={[4, 4, 0, 0]} maxBarSize={40} />
                                                            <Line type="monotone" dataKey="هدف" stroke="#f59e0b" strokeWidth={2} dot={{r: 3, fill: "#f59e0b", strokeWidth: 0}} activeDot={{r: 5}} />
                                                        </ComposedChart>
                                                    </ResponsiveContainer>
                                                </div>

                                                {/* Summary Stats */}
                                                <div className="flex justify-between text-[11px] font-en font-semibold bg-slate-50 p-3 rounded-xl border border-slate-100 mt-auto">
                                                    <div className="flex flex-col">
                                                        <span className="text-slate-400 mb-0.5 font-vazir">شروع (مبنا)</span>
                                                        <span className="text-slate-600">{formatOkrValue(okr.baseline, okr.metricKey)}</span>
                                                    </div>
                                                    <div className="flex flex-col text-center">
                                                        <span className="text-slate-400 mb-0.5 font-vazir">وضعیت فعلی</span>
                                                        <span className={`text-sm ${isSuccess ? 'text-emerald-600 font-black' : 'text-indigo-600 font-bold'}`}>{formatOkrValue(lastValidActual, okr.metricKey)}</span>
                                                    </div>
                                                    <div className="flex flex-col text-left">
                                                        <span className="text-slate-400 mb-0.5 font-vazir">تارگت نهایی</span>
                                                        <span className="text-slate-800">{formatOkrValue(okr.target, okr.metricKey)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
